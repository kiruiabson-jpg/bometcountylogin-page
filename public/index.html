<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>County Government of Bomet - PMTS</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /*==========================
    GLOBAL
==========================*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:linear-gradient(180deg,#2e97d4 0%,#2188c6 100%);

    min-height:100vh;

    overflow-x:hidden;

}

/*==========================
HEADER
==========================*/

header{

    height:50px;

    background:#2f96d0;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 25px;

    box-shadow:0 2px 6px rgba(0,0,0,.18);

}

.logo-area{

    display:flex;

    align-items:center;

    gap:8px;

}

.logo{

    width:34px;

    height:34px;

    object-fit:contain;

}

.logo-area h2{

    color:#fff;

    font-size:21px;

    font-weight:600;

}

/*==========================
NAVIGATION
==========================*/

nav{

    display:flex;

    align-items:center;

    gap:10px;

}

nav a{

    text-decoration:none;

    color:#fff;

    font-size:14px;

    padding:10px 18px;

    border-radius:4px;

    transition:.25s;

}

nav a.active{

    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.15);

}

nav a:hover{

    background:rgba(255,255,255,.15);

}

nav a i{

    margin-right:6px;

}

.login-top{

    border:none;

    color:white;

    cursor:pointer;

    background:#4ca6dc;

    padding:10px 18px;

    border-radius:5px;

    box-shadow:0 2px 4px rgba(0,0,0,.25);

    transition:.25s;

}

.login-top:hover{

    background:#5cb3e6;

}

.white-line{

    height:24px;

    background:#f7f7f7;

    box-shadow:0 1px 4px rgba(0,0,0,.12);

}

/*==========================
MAIN
==========================*/

.hero{

    display:flex;

    justify-content:center;

    align-items:center;

    padding:70px 15px;

}  

        .login-card{

    width:420px;

    background:white;

    border-radius:10px;

    overflow:hidden;

    box-shadow:0 12px 35px rgba(0,0,0,.25);

}

.card-header{

    background:#2d99d8;

    color:white;

    text-align:center;

    padding:32px 25px 25px;

}

.card-header h1{

    font-size:18px;

    line-height:30px;

    font-weight:700;

    text-transform:uppercase;

}

.card-header p{

    margin-top:18px;

    font-size:12px;

    line-height:22px;

    opacity:.95;

}

.card-body{

    padding:25px;

}

.card-body label{

    display:block;

    margin-bottom:8px;

    font-size:14px;

    color:#333;

    font-weight:500;

}

.card-body input{

    width:100%;

    height:44px;

    margin-bottom:20px;

    padding:0 14px;

    border:1px solid #d7d7d7;

    border-radius:4px;

    outline:none;

    font-size:14px;

    transition:.25s;

}

.card-body input:focus{

    border-color:#2f96d0;

    box-shadow:0 0 0 3px rgba(52,152,219,.18);

}
        #loginBtn{

    width:100%;

    height:42px;

    border:none;

    cursor:pointer;

    border-radius:4px;

    background:#9da9ab;

    color:white;

    font-size:15px;

    font-weight:600;

    transition:.3s;

}

#loginBtn:hover{

    background:#7d8b8d;

}

.card-footer{

    border-top:1px solid #eee;

    text-align:center;

    padding:18px;

    font-size:13px;

    color:#666;

}

.card-footer a{

    text-decoration:none;

    color:#8b5d3b;

}

.card-footer a:hover{

    text-decoration:underline;

}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:900px){

header{

    flex-direction:column;

    height:auto;

    padding:15px;

}

nav{

    flex-wrap:wrap;

    justify-content:center;

    margin-top:15px;

}

.logo-area h2{

    font-size:18px;

}

.login-card{

    width:95%;

}

}
  /* ==========================
   Extra Animations
========================== */

body{

    transition:.5s;

}

.login-card{

    animation:fadeUp .8s ease;

}

@keyframes fadeUp{

    from{

        opacity:0;
        transform:translateY(45px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

input:hover{

    border-color:#58aee3;

}

button{

    transition:.3s;

}

button:active{

    transform:scale(.98);

}

.login-card:hover{

    box-shadow:0 18px 45px rgba(0,0,0,.30);

}

.logo{

    transition:.35s;

}

.logo:hover{

    transform:rotate(6deg) scale(1.08);

}

nav a{

    position:relative;

}

nav a::after{

    content:"";

    position:absolute;

    left:0;

    bottom:-5px;

    width:0;

    height:2px;

    background:white;

    transition:.3s;

}

nav a:hover::after{

    width:100%;

}      
<style>
</head>

<body>

<header>

    <div class="logo-area">

        <!-- Replace with your logo URLs -->
        <img src="YOUR_LOGO1_URL" class="logo">

        <img src="YOUR_LOGO2_URL" class="logo">

        <h2>COUNTY GOVERNMENT OF BOMET (PMTS)</h2>

    </div>

    <nav>

        <a href="#" class="active">
            <i class="fa fa-home"></i>
            Main Website
        </a>

        <a href="#">
            Dashboard
        </a>

        <a href="#">
            Projects
        </a>

        <a href="#">
            Reports
        </a>

        <a href="#">
            Feedback
        </a>

        <button class="login-top">
            <i class="fa fa-lock"></i>
            Login
        </button>

    </nav>

</header>

<div class="white-line"></div>

<section class="hero">

    <div class="login-card">

        <div class="card-header">

            <h1>
                COUNTY GOVERNMENT OF BOMET PROJECTS
                <br>
                MONITORING AND TRACKING SYSTEM
            </h1>

            <p>
                An Integrated System Designed To Strengthen Project Oversight,
                Drive Operational Efficiency, And Promote Transparent Accountability
                Across All County Departments.
            </p>

        </div>

        <div class="card-body">

            <label>Username</label>

            <input
                type="text"
                placeholder="Enter your username"
            >

            <label>Password</label>

            <input
                type="password"
                placeholder="Enter your password"
            >

            <button id="loginBtn">
                Login
            </button>

        </div>

        <div class="card-footer">

            Need access?
            <a href="#">
                Contact system administrator
            </a>

        </div>

    </div>

</section>

<script>
    // ===============================
// Login Page Script
// ===============================

const username = document.querySelector('input[type="text"]');
const password = document.querySelector('input[type="password"]');
const loginBtn = document.getElementById("loginBtn");

// Login Validation
loginBtn.addEventListener("click", function () {

    if (username.value.trim() === "") {

        alert("Please enter your username.");
        username.focus();
        return;

    }

    if (password.value.trim() === "") {

        alert("Please enter your password.");
        password.focus();
        return;

    }

    loginBtn.innerHTML = "Logging in...";

    loginBtn.disabled = true;

    setTimeout(() => {

        loginBtn.innerHTML = "Login";
        loginBtn.disabled = false;

        alert("Demo login successful.");

        // Replace with your backend login URL
        // window.location.href = "dashboard.html";

    }, 1200);

});


// Login when pressing Enter
document.addEventListener("keydown", function(e){

    if(e.key==="Enter"){

        loginBtn.click();

    }

});


// Input animation
document.querySelectorAll("input").forEach(input=>{

    input.addEventListener("focus",()=>{

        input.parentElement.classList.add("active");

    });

    input.addEventListener("blur",()=>{

        input.parentElement.classList.remove("active");

    });

});


// Navbar Active State
document.querySelectorAll("nav a").forEach(link=>{

    link.addEventListener("click",function(e){

        document.querySelectorAll("nav a").forEach(item=>{

            item.classList.remove("active");

        });

        this.classList.add("active");

    });

});


// Smooth Page Fade
window.onload=function(){

    document.body.style.opacity="0";

    setTimeout(()=>{

        document.body.style.transition=".5s";
        document.body.style.opacity="1";

    },100);

};
    </script>

</body>
</html>
